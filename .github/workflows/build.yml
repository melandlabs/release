  build-tauri-windows:
    needs: get-version
    if: needs.get-version.outputs.version != ''
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4

      - name: Clone alloomi source code
        run: |
          git clone https://x-access-token:${{ secrets.DEPLOY_ACCESS_TOKEN }}@github.com/${{ env.ALLOOMI_REPO }}.git alloomi
          cd alloomi
          git checkout ${{ needs.get-version.outputs.checkout_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Add pnpm to PATH
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "$HOME\AppData\Local\pnpm"
          Add-Content -Path $env:GITHUB_ENV -Value "PNPM_HOME=$HOME\AppData\Local\pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Rust target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Get pnpm store directory
        run: |
          $storePath = pnpm store path --silent
          Add-Content -Path $env:GITHUB_ENV -Value "STORE_PATH=$storePath"

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('alloomi/**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: ./alloomi
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Rebuild native modules for Tauri
        working-directory: ./alloomi
        run: |
          pnpm rebuild better-sqlite3
          # Copy the compiled .node into imessage-kit's nested better-sqlite3
          $nestedBss = "node_modules\@photon-ai\imessage-kit\node_modules\better-sqlite3"
          Remove-Item -Force $nestedBss -Recurse -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path "$nestedBss\build\Release" | Out-Null
          Copy-Item "node_modules\better-sqlite3\build\Release\better_sqlite3.node" "$nestedBss\build\Release\"

      - name: Verify native modules are built
        working-directory: ./alloomi
        run: |
          Write-Host "=== Checking top-level better-sqlite3 ==="
          Get-ChildItem -Path "node_modules\better-sqlite3\build\Release\better_sqlite3.node" -ErrorAction Stop
          Write-Host "=== Checking nested better-sqlite3 in imessage-kit ==="
          Get-ChildItem -Path "node_modules\@photon-ai\imessage-kit\node_modules\better-sqlite3\build\Release\better_sqlite3.node" -ErrorAction Stop
          Write-Host "All native modules built successfully"

      - name: Patch tauri.conf.json to skip MSI on Windows
        working-directory: ./alloomi/apps/web
        run: |
          $file = "src-tauri\tauri.conf.json"
          $content = Get-Content $file -Raw
          Write-Host "Original targets/wix config:"
          $content -match '"targets"\s*:\s*(\[.*?\]|"[^"]*")' | Out-Null
          if ($Matches) { Write-Host "  Found: $($Matches[0])" }

          # Replace targets: "all" or targets: [...] with targets: ["nsis"]
          $content = $content -replace '"targets"\s*:\s*"all"', '"targets": ["nsis"]'
          $content = $content -replace '"targets"\s*:\s*\[.*?\]', '"targets": ["nsis"]'

          # Nullify the wix sub-config so WiX is not independently triggered
          $content = $content -replace '"wix"\s*:\s*\{[^}]*\}', '"wix": null'

          Set-Content -Path $file -Value $content -NoNewline
          Write-Host "Patched targets/wix config:"
          Get-Content $file | Select-String 'targets'
          Get-Content $file | Select-String 'wix'

      - name: Clear cached WIX directory to force clean download
        run: |
          $wixDir = "$env:LOCALAPPDATA\tauri\WixTools314"
          if (Test-Path $wixDir) {
            Write-Host "Removing cached WIX directory: $wixDir"
            Remove-Item -Recurse -Force $wixDir
          } else {
            Write-Host "No cached WIX directory found at $wixDir"
          }

      - name: Create .env file
        working-directory: ./alloomi/apps/web
        run: |
          @"
          # Cloud API Configuration for Tauri Desktop App
          CLOUD_API_URL=https://app.alloomi.ai
          NEXT_PUBLIC_CLOUD_API_URL=https://app.alloomi.ai
          NEXT_PUBLIC_APP_URL=http://localhost:3415
          LLM_BASE_URL=https://openrouter.ai/api/v1
          LLM_MODEL=google/gemini-3-flash-preview
          LLM_REASONING_MODEL=google/gemini-3-flash-preview
          LLM_VISION_LANGUAGE_MODEL=google/gemini-3-flash-preview
          LLM_IMAGE_MODEL=openai/gpt-5-image
          LLM_EMBEDDING_MODEL=qwen/qwen3-embedding-4b
          LLM_EMBEDDING_BASE_URL=https://openrouter.ai/api/v1
          TELEGRAM_MODE=pooling
          ROLE_DETECTION_ENABLED=1
          ROLE_OVERLAY_ANALYST_JOURNALIST=1
          ROLE_OVERLAY_COMMUNITY_MANAGER=1
          ROLE_OVERLAY_CUSTOMER_SUCCESS=1
          ROLE_OVERLAY_EXECUTIVE=1
          ROLE_OVERLAY_FREELANCER=1
          ROLE_OVERLAY_INDIE_FOUNDER=1
          ROLE_OVERLAY_INVESTOR_ADVISOR=1
          ROLE_OVERLAY_REMOTE_WORKER=1
          ROLE_OVERLAY_SALES_BIZDEV=1
          ANTHROPIC_BASE_URL=http://localhost:3415/api/ai
          API_TIMEOUT_MS=3000000
          IS_TAURI=true
          IMESSAGE_BACKEND_MODE=sdk
          NEXT_PUBLIC_IMESSAGE_BACKEND_MODE=sdk
          "@ | Out-File -FilePath ".env" -Encoding UTF8

      - name: Build Tauri app (Windows)
        working-directory: ./alloomi/apps/web
        run: |
          Write-Host "=== Config before build ==="
          Get-Content src-tauri\tauri.conf.json | Select-String targets
          pnpm tauri build
          node scripts/optimize-tauri-bundle.js

      - name: Find .exe installer
        id: exe
        working-directory: ./alloomi/apps/web/src-tauri/target/release/bundle
        run: |
          $exe = Get-ChildItem -Path . -Recurse -Include "*.exe" | Select-Object -First 1
          $newName = $exe.Name -replace 'amd64\.exe$', 'windows_amd64.exe'
          Copy-Item $exe.FullName $newName
          "path=$newName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding UTF8
          "full_path=$($exe.DirectoryName)\$newName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding UTF8

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: alloomi-windows-amd64
          path: ${{ steps.exe.outputs.full_path }}

  release:
    needs: [get-version, build-tauri-macos-arm64, build-tauri-macos-amd64, build-tauri-linux-amd64, build-tauri-linux-arm64, build-tauri-windows]
    if: needs.get-version.outputs.version != ''
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Apple Silicon DMG
        uses: actions/download-artifact@v4
        with:
          name: alloomi-dmg-arm64

      - name: Download Apple Intel DMG
        uses: actions/download-artifact@v4
        with:
          name: alloomi-dmg-amd64

      - name: Download Linux AMD64 deb
        uses: actions/download-artifact@v4
        with:
          name: alloomi-linux-amd64

      - name: Download Linux ARM64 deb
        uses: actions/download-artifact@v4
        with:
          name: alloomi-linux-arm64

      - name: Download Windows exe
        uses: actions/download-artifact@v4
        with:
          name: alloomi-windows-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.get-version.outputs.version }}
          name: '${{ needs.get-version.outputs.version }}'
          body: 'See assets to download this version and install.'
          draft: false
          files: |
            Alloomi*.dmg
            *.deb
            Alloomi*windows*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        run: |
          # Find DMG file
          DMG_FILE=$(ls Alloomi*macOS*.dmg)

          # Extract version from filename (e.g., Alloomi_0.3.1_macOS_aarch64.dmg -> 0.3.1)
          VERSION=$(echo "$DMG_FILE" | sed -E 's/Alloomi_([0-9.]+)_macOS_aarch64.dmg/\1/')

          # Calculate SHA256
          SHA256=$(sha256sum "$DMG_FILE" | awk '{print $1}')

          # Update cask file
          sed -i "s/version \"[^\"]*\"/version \"$VERSION\"/" Casks/alloomi.rb
          sed -i "s/sha256 \"[^\"]*\"/sha256 \"$SHA256\"/" Casks/alloomi.rb
          sed -i "s|download/v[^/]*/|download/v${VERSION}/|g; s|Alloomi_[^_]*_|Alloomi_${VERSION}_|g" Casks/alloomi.rb

          # Commit changes
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Casks/alloomi.rb
          git commit -m "chore: update Homebrew cask to v$VERSION" || echo "No changes to commit"

      - name: Update winget manifest
        run: |
          # Find Windows exe file
          EXE_FILE=$(ls Alloomi*windows*.exe)

          # Extract version from filename
          VERSION=$(echo "$EXE_FILE" | sed -E 's/Alloomi_([0-9.]+)_windows_amd64.exe/\1/')

          # Calculate SHA256
          SHA256=$(sha256sum "$EXE_FILE" | awk '{print $1}')

          echo "Version: $VERSION"
          echo "SHA256: $SHA256"

          # Create winget manifest directory
          MANIFEST_DIR="wingetpkgs/manifests/a/Alloomi/Alloomi/$VERSION"
          mkdir -p "$MANIFEST_DIR"

          # Write installer manifest
          cat > "$MANIFEST_DIR/Alloomi-$VERSION.installer.yaml" << EOF
          # yaml-language-server: \$schema=https://aka.ms/winget-manifest.versionSchema
          ManifestVersion: 1.6.0
          Version: $VERSION
          InstallerLocale: en-US
          Platform:
            - Windows.Desktop
          Architecture:
            - x64
          Installers:
            - InstallerUrl: https://github.com/melandlabs/release/releases/download/v$VERSION/Alloomi_$VERSION\_windows_amd64.exe
              InstallerSha256: $SHA256
              InstallerType: nsis
              UpgradeBehavior: install
              Scope: user
              InstallModes:
                - Interactive
                - Silent
                - SilentWithProgress
          EOF

          # Write default manifest
          cat > "wingetpkgs/manifests/a/Alloomi/Alloomi/Alloomi.yaml" << EOF
          # yaml-language-server: \$schema=https://aka.ms/winget-manifest.defaultLocaleSchema
          ManifestVersion: 1.6.0
          Version: $VERSION
          Locales:
            - PackageLocale: en-US
              Publisher: Alloomi
              PublisherUrl: https://alloomi.ai
              PublisherSupportUrl: https://github.com/melandlabs/release/issues
              PrivacyUrl: https://alloomi.ai/privacy
              Author: Alloomi
              PackageName: Alloomi
              PackageUrl: https://github.com/melandlabs/release
              License: Apache-2.0
              LicenseUrl: https://github.com/melandlabs/release/blob/main/LICENSE
              Copyright: Copyright (c) 2024 Alloomi
              Description: AI-powered IM router and chat agent for macOS, Windows and Linux.
              ShortDescription: AI-powered IM router and chat agent
              Moniker: alloomi
              Tags:
                - ai
                - chat
                - im
                - messaging
                - imessage
                - telegram
                - slack
              ReleaseNotesUrl: https://github.com/melandlabs/release/releases/tag/v$VERSION
          InstallerManifest: Alloomi-$VERSION.installer.yaml
          EOF

          echo "✅ Winget manifest created"

      - name: Create PR to winget-pkgs
        env:
          VERSION: ${{ needs.get-version.outputs.version }}
        run: |
          set -e

          # Fork winget-pkgs (idempotent — skips if fork already exists)
          gh repo fork microsoft/winget-pkgs --clone=false --remote --confirm || true

          # Clone the fork shallowly
          FORK_DIR=$(mktemp -d)
          gh repo clone ${{ github.repository_owner }}/winget-pkgs "$FORK_DIR" -- --depth 1
          cd "$FORK_DIR"

          # Create a branch for this version
          git checkout -b "alloomi-v$VERSION"

          # Copy manifests into the fork
          mkdir -p "manifests/a/Alloomi/Alloomi/$VERSION"
          cp "${{ github.workspace }}/wingetpkgs/manifests/a/Alloomi/Alloomi/$VERSION/"*.yaml "manifests/a/Alloomi/Alloomi/$VERSION/"
          cp "${{ github.workspace }}/wingetpkgs/manifests/a/Alloomi/Alloomi/Alloomi.yaml" "manifests/a/Alloomi/Alloomi/"

          # Commit and push to the fork
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add manifests/a/Alloomi/Alloomi/
          git commit -m "Alloomi version $VERSION"
          git push -u origin "alloomi-v$VERSION" -f

          # Create PR to microsoft/winget-pkgs
          gh pr create \
            --repo microsoft/winget-pkgs \
            --base master \
            --head ${{ github.repository_owner }}:alloomi-v$VERSION \
            --title "Alloomi version $VERSION" \
            --body "Auto-generated PR for Alloomi v$VERSION.

Installer: NSIS (.exe) for Windows x64
Generated by GitHub Actions from ${{ github.repository }}"

          echo "PR created successfully"
          rm -rf "$FORK_DIR"

