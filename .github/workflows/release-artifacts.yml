name: Release Alloomi

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Source CI run ID (optional, defaults to latest)'
        required: false
        type: string

env:
  VERSION: '0.4.2'

permissions:
  contents: write

jobs:
  download-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Find latest CI run
        if: github.event.inputs.source_run_id == ''
        id: find-run
        run: |
          RUN_ID=$(gh run list --workflow=ci.yml --status=success --repo=${{ github.repository }} --limit=1 --json databaseId --jq '.[0].databaseId')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set source run ID
        id: source
        run: |
          echo "run_id=${{ github.event.inputs.source_run_id || steps.find-run.outputs.run_id }}" >> $GITHUB_OUTPUT

      - name: Setup artifacts directory
        run: mkdir -p artifacts

      - name: Download Linux AMD64
        run: |
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-linux -R ${{ github.repository }} -D linux_amd64
          find linux_amd64 -type f \( -name "*.deb" -o -name "*.AppImage" \) -exec mv {} "Alloomi_${{ env.VERSION }}_linux_amd64.deb" \;
          mv Alloomi_${{ env.VERSION }}_linux_amd64.deb artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux ARM64
        run: |
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-linux-arm64 -R ${{ github.repository }} -D linux_arm64
          find linux_arm64 -type f \( -name "*.deb" -o -name "*.AppImage" \) -exec mv {} "Alloomi_${{ env.VERSION }}_linux_aarch64.deb" \;
          mv Alloomi_${{ env.VERSION }}_linux_aarch64.deb artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download macOS ARM64
        run: |
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-dmg-macos -R ${{ github.repository }} -D macos_arm64
          find macos_arm64 -type f -name "*.dmg" -exec mv {} "Alloomi_${{ env.VERSION }}_macOS_aarch64.dmg" \;
          mv Alloomi_${{ env.VERSION }}_macOS_aarch64.dmg artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download macOS AMD64
        run: |
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-dmg-x64 -R ${{ github.repository }} -D macos_amd64
          find macos_amd64 -type f -name "*.dmg" -exec mv {} "Alloomi_${{ env.VERSION }}_macOS_amd64.dmg" \;
          mv Alloomi_${{ env.VERSION }}_macOS_amd64.dmg artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Windows
        run: |
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-windows -R ${{ github.repository }} -D windows
          find windows -type f -name "*.exe" -exec mv {} "Alloomi_${{ env.VERSION }}_windows_amd64.exe" \;
          mv Alloomi_${{ env.VERSION }}_windows_amd64.exe artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts
        run: ls -la artifacts/

      - name: Verify artifact version
        run: |
          echo "Expected version: ${{ env.VERSION }}"
          ARTIFACT_VERSION=$(dpkg-deb -I artifacts/Alloomi_${{ env.VERSION }}_linux_amd64.deb | grep Version | awk '{print $2}')
          echo "Artifact version: $ARTIFACT_VERSION"
          if [ "$ARTIFACT_VERSION" != "${{ env.VERSION }}" ]; then
            echo "ERROR: Artifact version mismatch! Expected ${{ env.VERSION }}, got $ARTIFACT_VERSION"
            exit 1
          fi
          echo "Version verified successfully"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.4.2
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            artifacts/Alloomi_${{ env.VERSION }}_linux_amd64.deb
            artifacts/Alloomi_${{ env.VERSION }}_linux_aarch64.deb
            artifacts/Alloomi_${{ env.VERSION }}_macOS_aarch64.dmg
            artifacts/Alloomi_${{ env.VERSION }}_macOS_amd64.dmg
            artifacts/Alloomi_${{ env.VERSION }}_windows_amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
