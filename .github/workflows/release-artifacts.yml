name: Release Alloomi

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Source CI run ID (optional, defaults to latest)'
        required: false
        type: string

env:
  VERSION: '0.4.1'

permissions:
  contents: write

jobs:
  download-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Find latest CI run
        if: github.event.inputs.source_run_id == ''
        id: find-run
        run: |
          RUN_ID=$(gh run list --workflow=ci.yml --status=success --repo=${{ github.repository }} --limit=1 --json databaseId --jq '.[0].databaseId')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set source run ID
        id: source
        run: |
          echo "run_id=${{ github.event.inputs.source_run_id || steps.find-run.outputs.run_id }}" >> $GITHUB_OUTPUT

      - name: Download Linux AMD64
        run: |
          mkdir -p artifacts
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-linux -R ${{ github.repository }} -D artifacts
          cd artifacts
          for f in *.deb; do
            [ -f "$f" ] && mv "$f" "Alloomi_${{ env.VERSION }}_linux_amd64.deb"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux ARM64
        run: |
          mkdir -p artifacts
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-linux-arm64 -R ${{ github.repository }} -D artifacts
          cd artifacts
          for f in *.deb; do
            [ -f "$f" ] && mv "$f" "Alloomi_${{ env.VERSION }}_linux_aarch64.deb"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download macOS ARM64
        run: |
          mkdir -p artifacts
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-dmg-macos -R ${{ github.repository }} -D artifacts
          cd artifacts
          for f in *.dmg; do
            [ -f "$f" ] && mv "$f" "Alloomi_${{ env.VERSION }}_macOS_aarch64.dmg"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download macOS AMD64
        run: |
          mkdir -p artifacts
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-dmg-x64 -R ${{ github.repository }} -D artifacts
          cd artifacts
          for f in *.dmg; do
            [ -f "$f" ] && mv "$f" "Alloomi_${{ env.VERSION }}_macOS_amd64.dmg"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Windows
        run: |
          mkdir -p artifacts
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-windows -R ${{ github.repository }} -D artifacts
          cd artifacts
          for f in *.exe; do
            [ -f "$f" ] && mv "$f" "Alloomi_${{ env.VERSION }}_windows_amd64.exe"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.4.1
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            artifacts/Alloomi_${{ env.VERSION }}_linux_amd64.deb
            artifacts/Alloomi_${{ env.VERSION }}_linux_aarch64.deb
            artifacts/Alloomi_${{ env.VERSION }}_macOS_aarch64.dmg
            artifacts/Alloomi_${{ env.VERSION }}_macOS_amd64.dmg
            artifacts/Alloomi_${{ env.VERSION }}_windows_amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
