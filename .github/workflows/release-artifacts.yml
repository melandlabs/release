name: Release Alloomi

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Source CI run ID (optional, defaults to latest)'
        required: false
        type: string

env:
  VERSION: '0.4.1'

jobs:
  download-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Find latest CI run
        if: github.event.inputs.source_run_id == ''
        id: find-run
        run: |
          RUN_ID=$(gh run list --workflow=ci.yml --status=success --repo=${{ github.repository }} --limit=1 --json databaseId --jq '.[0].databaseId')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set source run ID
        id: source
        run: |
          echo "run_id=${{ github.event.inputs.source_run_id || steps.find-run.outputs.run_id }}" >> $GITHUB_OUTPUT

      - name: Download Linux AMD64 artifact
        uses: actions/download-artifact@v4
        with:
          name: alloomi-ci-linux
          path: artifacts/
          run-id: ${{ steps.source.outputs.run_id }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename Linux AMD64
        run: |
          cd artifacts
          ls -la
          for f in *.deb; do
            [ -f "$f" ] && mv "$f" "Alloomi_${{ env.VERSION }}_linux_amd64.deb"
          done
          ls -la

      - name: Upload Linux AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alloomi_${{ env.VERSION }}_linux_amd64
          path: artifacts/Alloomi_${{ env.VERSION }}_linux_amd64.deb

  download-and-release-linux-arm64:
    runs-on: ubuntu-22.04
    steps:
