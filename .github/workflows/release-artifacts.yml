name: Release Alloomi

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      source_run_id:
        description: 'Source CI run ID (optional, defaults to latest)'
        required: false
        type: string

env:
  VERSION: '0.4.2'

permissions:
  contents: write

jobs:
  download-and-release:
    runs-on: ubuntu-22.04
    steps:
      - name: Find latest CI run
        if: github.event.inputs.source_run_id == ''
        id: find-run
        run: |
          RUN_ID=$(gh run list --workflow=ci.yml --status=success --repo=${{ github.repository }} --limit=1 --json databaseId --jq '.[0].databaseId')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set source run ID
        id: source
        run: |
          echo "run_id=${{ github.event.inputs.source_run_id || steps.find-run.outputs.run_id }}" >> $GITHUB_OUTPUT

      - name: Setup artifacts directory
        run: mkdir -p artifacts

      - name: Download Linux AMD64
        run: |
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-linux -R ${{ github.repository }} -D linux_amd64
          find linux_amd64 -type f \( -name "*.deb" -o -name "*.AppImage" \) -exec mv {} "Alloomi_${{ env.VERSION }}_linux_amd64.deb" \;
          mv Alloomi_${{ env.VERSION }}_linux_amd64.deb artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux ARM64
        run: |
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-linux-arm64 -R ${{ github.repository }} -D linux_arm64
          find linux_arm64 -type f \( -name "*.deb" -o -name "*.AppImage" \) -exec mv {} "Alloomi_${{ env.VERSION }}_linux_aarch64.deb" \;
          mv Alloomi_${{ env.VERSION }}_linux_aarch64.deb artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download macOS ARM64
        run: |
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-dmg-macos -R ${{ github.repository }} -D macos_arm64
          find macos_arm64 -type f -name "*.dmg" -exec mv {} "Alloomi_${{ env.VERSION }}_macOS_aarch64.dmg" \;
          mv Alloomi_${{ env.VERSION }}_macOS_aarch64.dmg artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download macOS AMD64
        run: |
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-dmg-x64 -R ${{ github.repository }} -D macos_amd64
          find macos_amd64 -type f -name "*.dmg" -exec mv {} "Alloomi_${{ env.VERSION }}_macOS_amd64.dmg" \;
          mv Alloomi_${{ env.VERSION }}_macOS_amd64.dmg artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Windows
        run: |
          gh run download ${{ steps.source.outputs.run_id }} -n alloomi-ci-windows -R ${{ github.repository }} -D windows
          find windows -type f -name "*.exe" -exec mv {} "Alloomi_${{ env.VERSION }}_windows_amd64.exe" \;
          mv Alloomi_${{ env.VERSION }}_windows_amd64.exe artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts
        run: ls -la artifacts/

      - name: Verify Linux artifact version
        run: |
          echo "Expected version: ${{ env.VERSION }}"
          ARTIFACT_VERSION=$(dpkg-deb -I artifacts/Alloomi_${{ env.VERSION }}_linux_amd64.deb | grep Version | awk '{print $2}')
          echo "Artifact version: $ARTIFACT_VERSION"
          if [ "$ARTIFACT_VERSION" != "${{ env.VERSION }}" ]; then
            echo "ERROR: Artifact version mismatch! Expected ${{ env.VERSION }}, got $ARTIFACT_VERSION"
            exit 1
          fi
          echo "Linux version verified successfully"

      - name: Verify macOS artifact version
        run: |
          python3 << 'EOF'
          import re
          import sys
          import subprocess
          import tempfile
          import os

          dmg_path = "artifacts/Alloomi_${{ env.VERSION }}_macOS_aarch64.dmg"
          expected_version = "${{ env.VERSION }}"

          # Try to use udifd (part of libvhdi) to extract, or try 7z if available
          # First check if we can find the version string in raw DMG
          with open(dmg_path, 'rb') as f:
            data = f.read()

          # Search for version in various formats
          # 1. Look for "CFBundleShortVersionString" followed by version
          # 2. Look for version string directly (bytes)
          version_bytes = expected_version.encode('ascii')

          # The plist might use comma-separated version (0,4,2) on macOS
          comma_version = expected_version.replace('.', ',').encode('ascii')

          found = False
          found_version = None

          # Try to find plist XML with version
          patterns = [
            rb'CFBundleShortVersionString[^<]*<string>([\d\.]+)</string>',
            rb'CFBundleShortVersionString.*?' + version_bytes,
            rb'>' + version_bytes + rb'<.*?CFBundle',
          ]

          for pattern in patterns:
            matches = re.findall(pattern, data, re.DOTALL)
            if matches:
              for m in matches:
                if isinstance(m, bytes):
                  v = m.decode('ascii') if b'0' <= m[:1] <= b'9' else None
                else:
                  v = m
                if v and re.match(r'^\d+\.\d+\.\d+$', v):
                  found_version = v
                  break
            if found_version:
              break

          # If not found in XML, try comma format
          if not found_version:
            comma_pattern = rb'CFBundleShortVersionString[^<]*<string>([\d,]+)</string>'
            matches = re.findall(comma_pattern, data)
            for m in matches:
              v = m.decode('ascii').replace(',', '.')
              if re.match(r'^\d+\.\d+\.\d+$', v):
                found_version = v
                break

          # Still not found? Try searching for the raw version bytes more loosely
          if not found_version:
            # Look for the version string appearing anywhere
            idx = data.find(version_bytes)
            if idx != -1:
              # Get surrounding context
              chunk = data[max(0, idx-100):idx+100]
              print(f"Found version bytes at index {idx}, context: {chunk[:50]}...")
              # Just confirm it's there
              found = True
              found_version = expected_version

          if found_version:
            print(f"Expected version: {expected_version}")
            print(f"macOS artifact version: {found_version}")
            if found_version != expected_version:
              print(f"ERROR: macOS artifact version mismatch!")
              sys.exit(1)
            print("macOS version verified successfully")
          else:
            print(f"WARNING: Could not verify macOS version, skipping check")
            print(f"(DMG version extraction requires tools not available on Ubuntu runner)")
            # Don't fail the build, just warn
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.4.2
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            artifacts/Alloomi_${{ env.VERSION }}_linux_amd64.deb
            artifacts/Alloomi_${{ env.VERSION }}_linux_aarch64.deb
            artifacts/Alloomi_${{ env.VERSION }}_macOS_aarch64.dmg
            artifacts/Alloomi_${{ env.VERSION }}_macOS_amd64.dmg
            artifacts/Alloomi_${{ env.VERSION }}_windows_amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
