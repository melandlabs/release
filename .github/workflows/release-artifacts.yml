      - name: Set source run ID
        id: source
        run: |
          echo "run_id=${{ github.event.inputs.source_run_id || steps.find-run.outputs.run_id }}" >> $GITHUB_OUTPUT

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
